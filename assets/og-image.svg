<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#070a16"/>
  <circle cx="180" cy="120" r="360" fill="url(#g1)"/>
  <circle cx="1080" cy="180" r="340" fill="url(#g2)"/>
  <circle cx="760" cy="640" r="320" fill="url(#g3)"/>
  <rect width="1200" height="630" fill="#070a16" opacity="0.28"/>

  <!-- top row: badge + school -->
  <g font-family="'Sora','DejaVu Sans',sans-serif">
    <rect x="80" y="74" width="92" height="92" rx="22" fill="url(#badge)"/>
    <text x="126" y="138" font-size="40" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">AFIT</text>
    <text x="196" y="112" font-size="27" font-weight="700" fill="#e8edf7">Air Force Institute of Technology</text>
    <text x="196" y="148" font-size="20" font-weight="500" fill="#9aa6c4">Kaduna · Post-UTME Screening Prep</text>
  </g>

  <!-- main title -->
  <g font-family="'Sora','DejaVu Sans',sans-serif">
    <text x="80" y="290" font-size="86" font-weight="800" fill="url(#title)">Post-UTME Study Sprint</text>
    <text x="80" y="356" font-size="34" font-weight="600" fill="#c8d2ee">Engineering &amp; Sciences · 35-day daily-mission plan</text>
  </g>

  <!-- feature pills -->
  <g font-family="'Inter','DejaVu Sans',sans-serif" font-size="23" font-weight="700">
    <rect x="80" y="406" width="210" height="52" rx="26" fill="#141b33" stroke="#26304f"/>
    <text x="185" y="440" fill="#93c5fd" text-anchor="middle">55 lessons</text>
    <rect x="304" y="406" width="246" height="52" rx="26" fill="#141b33" stroke="#26304f"/>
    <text x="427" y="440" fill="#67e8f9" text-anchor="middle">350+ questions</text>
    <rect x="564" y="406" width="252" height="52" rx="26" fill="#141b33" stroke="#26304f"/>
    <text x="690" y="440" fill="#c4b5fd" text-anchor="middle">mock CBT exams</text>
  </g>

  <!-- subjects -->
  <g font-family="'Inter','DejaVu Sans',sans-serif" font-size="22" font-weight="600" fill="#9aa6c4">
    <text x="80" y="520">Maths   ·   Physics   ·   Chemistry   ·   English   ·   General Knowledge</text>
  </g>

  <!-- signature -->
  <g font-family="'Space Grotesk','Sora','DejaVu Sans',sans-serif">
    <circle cx="92" cy="566" r="7" fill="#22d3ee"/>
    <text x="112" y="574" font-size="26" font-weight="700" fill="url(#sig)">Built by Ojochegbe Peter Ojoh</text>
  </g>

  <!-- corner accent -->
  <g font-family="'Sora','DejaVu Sans',sans-serif" text-anchor="end">
    <text x="1120" y="540" font-size="22" font-weight="700" fill="#3b82f6" opacity="0.9">Quest for Excellence</text>
    <text x="1120" y="574" font-size="18" font-weight="500" fill="#6b769a">ojohpeters.github.io/my-afit-preps</text>
  </g>
</svg>
